<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😂 Joke Generator</h1>
            <div class="joke-display" id="jokeDisplay">
                <p>Click "Get Joke" to start laughing!</p>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="getJoke()">Get Joke</button>
                <button class="btn btn-secondary" onclick="shareJoke()">Share Joke</button>
                <button class="btn btn-tertiary" onclick="copyToClipboard()">Copy</button>
            </div>
            <div class="joke-type-selector">
                <label for="jokeType">Joke Type:</label>
                <select id="jokeType" onchange="updateJokeType()">
                    <option value="random">Random</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock Knock</option>
                </select>
            </div>
            <div class="loading" id="loading" style="display:none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>
        </div>
        <div class="joke-history" id="jokeHistory">
            <h3>History</h3>
            <ul id="historyList"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
